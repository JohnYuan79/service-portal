<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회중 봉사 포탈</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <main id="app" class="app">
        <section id="loginScreen" class="login-screen">
            <div class="login-card">
                <div class="brand-block">
                    <div class="brand-mark">봉</div>
                    <h1>회중 봉사 포탈</h1>
                    <p>이름을 입력하고 봉사 기록을 시작합니다.</p>
                </div>

                <form id="loginForm" class="login-form">
                    <label for="userName">이름</label>
                    <input id="userName" name="userName" type="text" placeholder="예: 홍길동" autocomplete="name"
                        required />

                    <label for="accessCode">접근코드</label>
                    <input id="accessCode" name="accessCode" type="password" placeholder="회중 접근코드" required />

                    <p id="loginMessage" class="form-message"></p>

                    <button type="submit" class="primary-button">
                        입장하기
                    </button>
                </form>

                <p class="login-note">
                    입력한 이름은 이 기기의 임시 사용자 정보로 저장됩니다.
                </p>
            </div>
        </section>

        <section id="mainScreen" class="main-screen hidden">
            <header class="top-bar">
                <div>
                    <p class="eyebrow">회중 봉사 포탈</p>
                    <h2 id="welcomeText">봉사 화면</h2>
                </div>
                <button id="logoutButton" class="text-button">이름 변경</button>
            </header>

            <section class="content-panel">
                <div id="tabContent">
                    <h3>전체일정</h3>
                    <p>전체 봉사 일정 달력 화면이 들어갈 영역입니다.</p>
                </div>
            </section>

            <nav class="bottom-nav">
                <button class="nav-item active" data-tab="schedule">
                    <span>전체일정</span>
                </button>
                <button class="nav-item" data-tab="field">
                    <span>호별봉사</span>
                </button>
                <button class="nav-item" data-tab="phone">
                    <span>전화봉사</span>
                </button>
                <button class="nav-item" data-tab="cart">
                    <span>전시대</span>
                </button>
            </nav>
        </section>
    </main>

    <script src="./js/app.js"></script>
</body>

</html>
